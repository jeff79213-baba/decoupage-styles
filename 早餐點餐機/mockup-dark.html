<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早餐點餐機 — 暗黑科技風 Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1A1A1A;
    color: #FFFFFF;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    background: #1A1A1A;
    border-bottom: 1px solid #333;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .store-name { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
  .store-name span { color: #F27D42; }
  .store-badge {
    background: #F27D42;
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-btn {
    background: #262626;
    border: 1px solid #333;
    color: #A0A0A0;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn:hover { background: #333; color: #fff; }

  /* ===== MAIN LAYOUT ===== */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== LEFT: CATEGORIES ===== */
  .categories {
    width: 72px;
    background: #1A1A1A;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .cat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px;
    border: none;
    background: transparent;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 12px;
    margin: 0 8px;
  }
  .cat-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cat-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cat-btn .cat-label { font-size: 10px; font-weight: 600; }
  .cat-btn:hover { background: #262626; color: #A0A0A0; }
  .cat-btn:hover .cat-icon { background: #444; }
  .cat-btn.active {
    background: #F27D42;
    color: #fff;
    box-shadow: 0 4px 16px rgba(242,125,66,0.3);
  }
  .cat-btn.active .cat-icon { background: rgba(255,255,255,0.2); }

  /* ===== CENTER: ITEMS ===== */
  .items-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .items-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-shrink: 0;
  }
  .items-header h2 { font-size: 18px; font-weight: 800; }
  .items-header span { font-size: 12px; color: #666; }
  .items-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    padding: 0 20px 12px;
    overflow-y: auto;
    align-content: start;
  }
  .items-grid::-webkit-scrollbar { width: 4px; }
  .items-grid::-webkit-scrollbar-track { background: transparent; }
  .items-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .item-card {
    background: #262626;
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    position: relative;
  }
  .item-card:hover { border-color: #444; transform: translateY(-2px); }
  .item-card.selected {
    border-color: #F27D42;
    background: #2A2018;
    box-shadow: 0 0 20px rgba(242,125,66,0.15);
  }
  .item-card.active {
    border-color: #F27D42;
    background: #2A2018;
    box-shadow: 0 0 24px rgba(242,125,66,0.25);
  }
  .item-card .item-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2px;
  }
  .item-card .item-icon svg { width: 22px; height: 22px; stroke: #A0A0A0; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .item-card.active .item-icon, .item-card.selected .item-icon { background: rgba(242,125,66,0.15); }
  .item-card.active .item-icon svg, .item-card.selected .item-icon svg { stroke: #F27D42; }
  .item-card .item-name { font-size: 13px; font-weight: 700; color: #fff; }
  .item-card .item-price { font-size: 14px; font-weight: 800; color: #F27D42; }
  .item-card .item-addons {
    font-size: 10px;
    color: #F27D42;
    background: rgba(242,125,66,0.1);
    padding: 2px 8px;
    border-radius: 8px;
    margin-top: 2px;
  }
  .item-card .qty-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #F27D42;
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
  }
  .item-card .cancel-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #FF4444;
    color: #fff;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .item-card.active .cancel-btn { display: flex; }

  /* ===== BOTTOM: ADDONS ===== */
  .addons-bar {
    background: #222;
    border-top: 1px solid #333;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .addons-label {
    font-size: 11px;
    color: #666;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .addons-list {
    display: flex;
    gap: 8px;
    flex: 1;
    overflow-x: auto;
  }
  .addons-list::-webkit-scrollbar { height: 0; }
  .addon-btn {
    background: #333;
    border: 1px solid #444;
    color: #ccc;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .addon-btn:hover { background: #444; color: #fff; }
  .addon-btn.active {
    background: #F27D42;
    border-color: #F27D42;
    color: #fff;
  }
  .addon-btn .addon-price { opacity: 0.7; font-size: 10px; }

  .add-to-cart-btn {
    background: #F27D42;
    border: none;
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-to-cart-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .add-to-cart-btn:hover { background: #E06C30; transform: scale(1.03); }
  .add-to-cart-btn:active { transform: scale(0.97); }

  /* ===== RIGHT: CART ===== */
  .cart-panel {
    width: 320px;
    background: #1E1E1E;
    border-left: 1px solid #333;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .cart-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .cart-header h3 {
    font-size: 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cart-header h3 svg { width: 18px; height: 18px; stroke: #F27D42; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cart-count {
    background: #F27D42;
    color: #fff;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
  }
  .cart-clear {
    background: none;
    border: none;
    color: #666;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
  }
  .cart-clear:hover { color: #FF4444; }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
  }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-track { background: transparent; }
  .cart-items::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .cart-item {
    background: #262626;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1px solid #333;
    transition: all 0.2s;
  }
  .cart-item:hover { border-color: #444; }
  .cart-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .cart-item-name {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    min-width: 0;
  }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid #444;
    background: transparent;
    color: #A0A0A0;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .qty-btn:hover { border-color: #F27D42; color: #F27D42; }
  .qty-btn.minus { border-color: #FF4444; color: #FF4444; }
  .qty-num {
    font-size: 14px;
    font-weight: 800;
    min-width: 20px;
    text-align: center;
  }
  .cart-item-addons {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .cart-addon-tag {
    background: rgba(242,125,66,0.15);
    color: #F27D42;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }
  .cart-item-price {
    font-size: 13px;
    font-weight: 800;
    color: #F27D42;
    margin-top: 6px;
    text-align: right;
  }

  .cart-footer {
    border-top: 1px solid #333;
    padding: 14px 18px 18px;
    flex-shrink: 0;
  }
  .cart-total {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cart-total-label { font-size: 13px; color: #A0A0A0; font-weight: 600; }
  .cart-total-amount {
    font-size: 24px;
    font-weight: 900;
    color: #F27D42;
  }
  .cart-actions { display: flex; gap: 8px; }
  .cart-action-btn {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .cart-action-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cart-action-btn.primary {
    background: #F27D42;
    color: #fff;
  }
  .cart-action-btn.primary:hover { background: #E06C30; }
  .cart-action-btn.secondary {
    background: #333;
    color: #A0A0A0;
    border: 1px solid #444;
  }
  .cart-action-btn.secondary:hover { background: #444; color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="store-name"><span>//</span> 好吃早餐店</div>
    <div class="store-badge">KIOSK</div>
  </div>
  <div class="header-right">
    <button class="header-btn">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      新訂單
    </button>
    <button class="header-btn">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CATEGORIES -->
  <div class="categories">
    <button class="cat-btn active" onclick="selectCat(this)">
      <span class="cat-icon">
        <svg viewBox="0 0 24 24"><path d="M3 11h18M5 11V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5M4 11v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 4v16"/></svg>
      </span>
      <span class="cat-label">漢堡</span>
    </button>
    <button class="cat-btn" onclick="selectCat(this)">
      <span class="cat-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg>
      </span>
      <span class="cat-label">蛋餅</span>
    </button>
    <button class="cat-btn" onclick="selectCat(this)">
      <span class="cat-icon">
        <svg viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/><path d="M3 7l9-4 9 4"/></svg>
      </span>
      <span class="cat-label">吐司</span>
    </button>
    <button class="cat-btn" onclick="selectCat(this)">
      <span class="cat-icon">
        <svg viewBox="0 0 24 24"><path d="M8 2h8l2 18H6L8 2z"/><path d="M6 20h12"/></svg>
      </span>
      <span class="cat-label">飲料</span>
    </button>
  </div>

  <!-- ITEMS -->
  <div class="items-panel">
    <div class="items-header">
      <h2>漢堡</h2>
      <span>4 項</span>
    </div>
    <div class="items-grid">
      <!-- Item 1: Active -->
      <div class="item-card active" onclick="selectItem(this)">
        <button class="cancel-btn" onclick="event.stopPropagation(); cancelItem(this.parentElement)">✕</button>
        <span class="qty-badge">X1</span>
        <span class="item-icon">
          <svg viewBox="0 0 24 24"><path d="M3 11h18M5 11V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5M4 11v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 4v16"/></svg>
        </span>
        <span class="item-name">豬肉漢堡</span>
        <span class="item-price">$65</span>
        <span class="item-addons">+ 加蛋 +$10</span>
      </div>
      <!-- Item 2: Selected -->
      <div class="item-card selected" onclick="selectItem(this)">
        <button class="cancel-btn" onclick="event.stopPropagation(); cancelItem(this.parentElement)">✕</button>
        <span class="qty-badge">X1</span>
        <span class="item-icon">
          <svg viewBox="0 0 24 24"><path d="M3 11h18M5 11V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5M4 11v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 4v16"/></svg>
        </span>
        <span class="item-name">牛肉漢堡</span>
        <span class="item-price">$75</span>
      </div>
      <!-- Item 3: Normal -->
      <div class="item-card" onclick="selectItem(this)">
        <button class="cancel-btn" onclick="event.stopPropagation(); cancelItem(this.parentElement)">✕</button>
        <span class="item-icon">
          <svg viewBox="0 0 24 24"><path d="M3 11h18M5 11V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5M4 11v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 4v16"/></svg>
        </span>
        <span class="item-name">起司漢堡</span>
        <span class="item-price">$55</span>
      </div>
      <!-- Item 4: Normal -->
      <div class="item-card" onclick="selectItem(this)">
        <button class="cancel-btn" onclick="event.stopPropagation(); cancelItem(this.parentElement)">✕</button>
        <span class="item-icon">
          <svg viewBox="0 0 24 24"><path d="M3 11h18M5 11V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v5M4 11v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 4v16"/></svg>
        </span>
        <span class="item-name">火腿漢堡</span>
        <span class="item-price">$50</span>
      </div>
    </div>

    <!-- ADDONS BAR -->
    <div class="addons-bar">
      <span class="addons-label">配料（豬肉漢堡）</span>
      <div class="addons-list">
        <button class="addon-btn active" onclick="toggleAddon(this)">加蛋 <span class="addon-price">+$10</span></button>
        <button class="addon-btn" onclick="toggleAddon(this)">加起司 <span class="addon-price">+$15</span></button>
        <button class="addon-btn" onclick="toggleAddon(this)">加辣</button>
      </div>
      <button class="add-to-cart-btn" onclick="addToCart()">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        加入購物車
      </button>
    </div>
  </div>

  <!-- CART -->
  <div class="cart-panel">
    <div class="cart-header">
      <h3>
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        購物車 <span class="cart-count">3</span>
      </h3>
      <button class="cart-clear">清除全部</button>
    </div>
    <div class="cart-items">
      <div class="cart-item">
        <div class="cart-item-top">
          <span class="cart-item-name">豬肉漢堡</span>
          <div class="cart-item-qty">
            <button class="qty-btn minus">−</button>
            <span class="qty-num">2</span>
            <button class="qty-btn">+</button>
          </div>
        </div>
        <div class="cart-item-addons">
          <span class="cart-addon-tag">+ 加蛋 $10</span>
        </div>
        <div class="cart-item-price">$150</div>
      </div>
      <div class="cart-item">
        <div class="cart-item-top">
          <span class="cart-item-name">牛肉漢堡</span>
          <div class="cart-item-qty">
            <button class="qty-btn minus">−</button>
            <span class="qty-num">1</span>
            <button class="qty-btn">+</button>
          </div>
        </div>
        <div class="cart-item-addons">
          <span class="cart-addon-tag">+ 加蛋 $10</span>
          <span class="cart-addon-tag">+ 加起司 $15</span>
        </div>
        <div class="cart-item-price">$100</div>
      </div>
      <div class="cart-item">
        <div class="cart-item-top">
          <span class="cart-item-name">起司漢堡</span>
          <div class="cart-item-qty">
            <button class="qty-btn minus">−</button>
            <span class="qty-num">1</span>
            <button class="qty-btn">+</button>
          </div>
        </div>
        <div class="cart-item-price">$55</div>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span class="cart-total-label">總計（4 項）</span>
        <span class="cart-total-amount">$305</span>
      </div>
      <div class="cart-actions">
        <button class="cart-action-btn secondary">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          廚房列印
        </button>
        <button class="cart-action-btn primary">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          確認訂單
        </button>
      </div>
    </div>
  </div>

</div>

<script>
function selectCat(el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function selectItem(el) {
  document.querySelectorAll('.item-card').forEach(c => {
    if (c !== el && c.classList.contains('active')) {
      c.classList.remove('active');
      c.classList.add('selected');
    }
  });
  el.classList.remove('selected');
  el.classList.add('active');
}
function cancelItem(el) {
  el.classList.remove('active', 'selected');
  el.querySelector('.qty-badge')?.remove();
  el.querySelector('.item-addons')?.remove();
}
function toggleAddon(el) {
  el.classList.toggle('active');
}
function addToCart() {
  const btn = document.querySelector('.add-to-cart-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 已加入！';
  btn.style.background = '#22C55E';
  setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#F27D42'; }, 1200);
}
</script>

</body>
</html>
